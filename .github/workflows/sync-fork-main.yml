name: Sync fork main with upstream

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork main branch to upstream/main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/ai-dynamo/dynamo.git 2>/dev/null || true
          git fetch upstream main

          git checkout main
          git reset --hard upstream/main
          # Safe because this fork's main branch is intended to mirror upstream/main.
          git push origin main --force
